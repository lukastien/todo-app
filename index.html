<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple todo list app to add, complete, and delete tasks in your browser.">
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="todo-app">
    <h1>Todo List</h1>

    <section class="input-section" aria-labelledby="add-task-heading">
      <h2 id="add-task-heading" class="visually-hidden">Add a new task</h2>
      <form id="task-form" class="task-form" novalidate>
        <label for="task-input" class="visually-hidden">Task description</label>
        <input
          type="text"
          id="task-input"
          name="task"
          placeholder="What needs to be done?"
          autocomplete="off"
          maxlength="200"
          aria-describedby="validation-message"
          required
        >
        <button type="submit" id="add-btn">Add Task</button>
      </form>
      <p id="validation-message" class="status-message" aria-live="polite" hidden></p>
    </section>

    <section class="task-section" aria-labelledby="tasks-heading">
      <h2 id="tasks-heading" class="visually-hidden">Your tasks</h2>
      <p id="empty-state" class="empty-state" hidden>No tasks yet. Add one above.</p>
      <ul id="task-list" class="task-list" aria-live="polite" aria-relevant="additions removals" hidden></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
